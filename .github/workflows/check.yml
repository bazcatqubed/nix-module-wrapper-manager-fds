name: Check test suite
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check:
    name: Check outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21
      - run: make check
  check-reuse-compliance:
    name: Check for REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v21
      - run: make check-reuse
