StylesPath = styles
MinAlertLevel = suggestion
Packages = AsciiDoc
IgnoredClasses = path
Vocab = Local

[*]
BasedOnStyles = Readability

[asciidoctor]
experimental = YES
attribute-missing = drop

[*.adoc]
BasedOnStyles = Vale, Readability, AsciiDoc
AsciiDoc.UnsetAttributes = NO
TokenIgnores = (\+[^+\n]+\+), (\b[a-z][a-z_]* key\b)
